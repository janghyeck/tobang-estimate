<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>토방이앤지 통합 견적 시스템</title>
<style>
/* [1] 기존 스타일 100% 보존 */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f3f4f6;color:#1a1a2e;font-size:13px;}
.container{max-width:960px;margin:0 auto;padding:16px;}
.sec{background:#fff;border:0.5px solid #d1d5db;border-radius:10px;padding:16px;margin-bottom:10px;}
.sec-title{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;}
.chk-block{border:0.5px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.row-area{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.row-area label{font-size:12px;color:#6b7280;min-width:110px;}
.row-area input, .row-area select{height:32px;border:0.5px solid #d1d5db;border-radius:6px;padding:0 8px;font-size:12px;}
.btn-primary{width:100%;height:42px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.tab-wrap{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;height:34px;border:0.5px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;}
.tab.active{background:#f3f4f6;color:#1a1a2e;font-weight:600;}

/* [2] 메가타운(사진 6-2) 원가계산서 전용 레이아웃 스타일 */
.gabji-table {width:100%; border-collapse:collapse; border:1.5px solid #000;}
.gabji-table th, .gabji-table td {border:1px solid #000; padding:5px 8px; font-size:11px; color:#000;}
.v-td {writing-mode:vertical-lr; text-align:center; vertical-align:middle; background:#f8f9fa !important; font-weight:bold; letter-spacing:4px;}
.sub-total {background:#e8f0fb !important; font-weight:bold;}
.grand-total {background:#1e3a5f !important; color:#fff !important; font-weight:bold; font-size:13px;}
.r {text-align:right;} .c {text-align:center;}

@media print{
    .no-print, .tab-wrap, .btn-primary {display:none !important;}
    .container {max-width:100%; padding:0;}
    .sec {border:none; padding:0;}
    @page {size:A4 portrait; margin:10mm;}
}
</style>
</head>
<body>

<div class="container">
    <h1 style="font-size:18px; color:#1a1a2e; margin-bottom:15px; text-align:center;">토방이앤지 전문 견적 관리 툴</h1>

    <div class="sec no-print">
        <div class="sec-title">기본 정보</div>
        <div class="row-area">
            <label>현장명</label><input type="text" id="f-name" value="메가타운 옥상 방수" style="flex:1;">
        </div>
        <div class="row-area">
            <label>전체 면적</label><input type="number" id="pyeong" value="60"> 평
        </div>

        <div class="chk-block">
            <input type="checkbox" id="chk-bt" checked> <label style="font-weight:600;">바탕조정 공정</label>
            <div class="row-area" style="margin-top:10px;">
                <label>두께(mm)</label><input type="number" id="bt-thick" value="1.5">
                <label>하이퍼 단가</label><input type="number" id="bt-price" value="65000">
            </div>
        </div>

        <div class="chk-block">
            <input type="checkbox" id="chk-ur" checked> <label style="font-weight:600;">우레탄 방수 공정</label>
            <div class="row-area" style="margin-top:10px;">
                <label>우레탄 두께</label><select id="ur-thick"><option value="1.5">1.5mm</option><option value="2" selected>2.0mm</option></select>
            </div>
        </div>

        <div class="chk-block">
            <input type="checkbox" id="chk-sky" checked> <label style="font-weight:600;">장비비(스카이)</label>
            <div class="row-area" style="margin-top:10px;">
                <label>금액</label><input type="number" id="sky-amt" value="650000">
            </div>
        </div>
    </div>

    <button class="btn-primary no-print" onclick="runTobangSystem()">견적 산출 및 레이아웃 생성</button>

    <div id="result-wrap" style="display:none;">
        <div class="tab-wrap no-print">
            <button class="tab active" onclick="switchTab('gabji')">공사원가계산서(사진6-2)</button>
            <button class="tab" onclick="switchTab('detail')">내역서(을지)</button>
        </div>

        <div id="tab-gabji" class="sec">
            <h2 style="text-align:center; padding:10px 0; letter-spacing:10px; text-decoration:underline;">공 사 원 가 계 산 서</h2>
            <div id="gabji-area"></div>
        </div>

        <div id="tab-detail" class="sec" style="display:none;">
            <h2 style="text-align:center; padding:10px 0; letter-spacing:8px;">내 역 서</h2>
            <div id="detail-area"></div>
        </div>
        
        <button class="btn-primary no-print" style="background:#16a34a;" onclick="window.print()">전문 견적서 인쇄</button>
    </div>
</div>

<script>
function n(v){ return Math.round(v).toLocaleString(); }
function ru(v){ return Math.round(v/10000)*10000; }

function switchTab(id) {
    document.getElementById('tab-gabji').style.display = id==='gabji'?'block':'none';
    document.getElementById('tab-detail').style.display = id==='detail'?'block':'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
}

function runTobangSystem() {
    // [I] 기존 로직 100% 보존 (형님의 원본 계산식)
    const py = parseFloat(document.getElementById('pyeong').value);
    const sqm = py * 3.3058;
    const sky = parseFloat(document.getElementById('sky-amt').value) || 0;
    
    let matSum = 0;
    let laborSum = 0;

    // --- 바탕조정 원본 로직 ---
    if(document.getElementById('chk-bt').checked) {
        const t = parseFloat(document.getElementById('bt-thick').value);
        const hp = parseFloat(document.getElementById('bt-price').value);
        const batchArea = (t <= 2) ? (96 / (1.75 * t)) : (176 / (1.75 * t));
        const batches = Math.ceil(sqm / batchArea);
        matSum += (batches * 16 * (hp/16)) + (batches * 2 * 7000);
        laborSum += (py < 20 ? 1 : 2) * 250000;
    }

    // --- 우레탄 원본 로직 ---
    if(document.getElementById('chk-ur').checked) {
        const ut = parseFloat(document.getElementById('ur-thick').value);
        const ureKg = sqm * ut * 1.4; 
        matSum += (Math.ceil(sqm * 0.13 / 14) * 52000) + (Math.ceil(ureKg / 20) * 57000) + (Math.ceil(sqm * 0.11 / 16) * 75000);
        laborSum += Math.ceil(2 + sqm * 0.02) * 250000;
    }

    // [II] 메가타운 스타일 원가 계산 (사진 6-2 기준)
    const iL = Math.round(laborSum * 0.122); 
    const totalLabor = laborSum + iL;
    const sj = Math.round(totalLabor * 0.037); 
    const em = Math.round(totalLabor * 0.0101);
    const hl = Math.round(laborSum * 0.03545);
    const pn = Math.round(laborSum * 0.045);
    const lt = Math.round(hl * 0.1281);
    const sf = Math.round((matSum + laborSum) * 0.0293);
    const sm = Math.round((matSum + totalLabor) * 0.058);

    const subTotal = matSum + totalLabor + sj + em + hl + pn + lt + sf + sm + sky;
    const gm = Math.round(subTotal * 0.05); 
    const pr = Math.round((totalLabor + sm + gm) * 0.1); 
    const finalTotal = ru(subTotal + gm + pr + (subTotal + gm + pr)*0.1);

    // [III] 레이아웃 생성 (Rowspan 적용)
    const expRows = 9; // 경비 항목 수
    const totalRows = 4 + 3 + expRows + 1; 

    let html = `<table class="gabji-table">
        <thead><tr><th colspan="2">비 목</th><th>금 액</th><th>구 성 비</th><th>비 고</th></tr></thead>
        <tbody>
            <tr><td rowspan="${totalRows}" class="v-td">순공사원가</td><td rowspan="4" class="v-td">재료비</td><td>직접재료비</td><td class="r">${n(matSum)}</td><td class="c">-</td><td>배합/도포량 기준</td></tr>
            <tr><td>간접재료비</td><td class="r">0</td><td class="c">-</td><td></td></tr>
            <tr><td>작업설, 부산물(△)</td><td class="r">0</td><td class="c">-</td><td></td></tr>
            <tr class="sub-total"><td>[ 소 계 ]</td><td class="r">${n(matSum)}</td><td class="c">-</td><td></td></tr>
            
            <tr><td rowspan="3" class="v-td">노무비</td><td>직접노무비</td><td class="r">${n(laborSum)}</td><td class="c">-</td><td>투입인원 기준</td></tr>
            <tr><td>간접노무비</td><td class="r">${n(iL)}</td><td class="c">12.2%</td><td>직노 * 12.2%</td></tr>
            <tr class="sub-total"><td>[ 소 계 ]</td><td class="r">${n(totalLabor)}</td><td class="c">-</td><td></td></tr>

            <tr><td rowspan="${expRows}" class="v-td">경비</td><td>기 계 경 비</td><td class="r">${n(sky)}</td><td class="c">-</td><td>스카이 등</td></tr>
            <tr><td>산 재 보 험 료</td><td class="r">${n(sj)}</td><td class="c">3.7%</td><td>노무비 대비</td></tr>
            <tr><td>고 용 보 험 료</td><td class="r">${n(em)}</td><td class="c">1.01%</td><td>노무비 대비</td></tr>
            <tr><td>국 민 건 강 보 험 료</td><td class="r">${n(hl)}</td><td class="c">3.545%</td><td>직노 대비</td></tr>
            <tr><td>국 민 연 금 보 험 료</td><td class="r">${n(pn)}</td><td class="c">4.5%</td><td>직노 대비</td></tr>
            <tr><td>노인장기요양보험료</td><td class="r">${n(lt)}</td><td class="c">12.81%</td><td>건강 대비</td></tr>
            <tr><td>산업안전보건관리비</td><td class="r">${n(sf)}</td><td class="c">2.93%</td><td>재+직노 대비</td></tr>
            <tr><td>기 타 경 비</td><td class="r">${n(sm)}</td><td class="c">5.8%</td><td>재+노무 대비</td></tr>
            <tr class="sub-total"><td colspan="2">[ 소 계 ]</td><td class="r">${n(subTotal)}</td><td class="c">-</td><td></td></tr>
            
            <tr class="grand-total"><td colspan="2" class="c">총 공 사 비</td><td class="r">${n(finalTotal)}</td><td colspan="2" class="c">VAT포함, 만원단위 반올림</td></tr>
        </tbody>
    </table>`;

    document.getElementById('gabji-area').innerHTML = html;
    document.getElementById('result-wrap').style.display = 'block';
}
</script>
</body>
</html>
