<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>토방이앤지 통합 견적 시스템</title>
<style>
/* 1. UI 및 기본 레이아웃 (기존 기능 유지) */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f3f4f6;color:#1a1a2e;font-size:13px;}
.container{max-width:960px;margin:0 auto;padding:16px;}
.sec{background:#fff;border:0.5px solid #d1d5db;border-radius:10px;padding:16px;margin-bottom:10px;}
.sec-title{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;}
.badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:10px;font-weight:600;margin-right:6px;}
.badge-blue{background:#eff6ff;color:#1d4ed8;} .badge-green{background:#f0fdf4;color:#15803d;} .badge-yellow{background:#fefce8;color:#a16207;}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.row label{font-size:12px;color:#6b7280;min-width:110px;}
.row input, .row select{flex:1;height:32px;border:0.5px solid #d1d5db;border-radius:6px;padding:0 8px;}
.chk-block{border:0.5px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.chk-head{display:flex;align-items:center;gap:8px;cursor:pointer;}
.chk-body{display:none;margin-top:10px;border-top:0.5px solid #f3f4f6;padding-top:10px;}
.btn-primary{width:100%;height:42px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.tab-wrap{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;height:34px;border:0.5px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;}
.tab.active{background:#2563eb;color:#fff;border-color:#2563eb;}

/* 2. 전문 원가계산서 전용 인쇄 스타일 (사진 6-2 스타일) */
#print-gabji-page table {width:100%; border-collapse:collapse; border:1px solid #000;}
#print-gabji-page th, #print-gabji-page td {border:1px solid #000; padding:4px 8px; font-size:11px;}
.vertical-td {writing-mode:vertical-lr; text-align:center; vertical-align:middle; background:#f4f4f4 !important; font-weight:bold; letter-spacing:4px;}
.sub-total-row {background:#e8f0fb !important; font-weight:bold;}
.grand-total-row {background:#1e3a5f !important; color:#fff !important; font-weight:bold; font-size:13px;}

@media print{
    body{background:#fff;} .no-print{display:none !important;}
    .container{width:100%; padding:0; margin:0;}
    .sec{border:none;}
    @page{size:A4 portrait; margin:10mm;}
}
</style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom:15px; color:#1e3a5f;">토방이앤지 방수공사 견적 툴</h2>

    <div class="sec no-print">
        <div class="sec-title">기본 정보 및 공정 설정</div>
        <div class="row">
            <label>공사 면적</label>
            <input type="number" id="pyeong" value="60">
            <select id="unit-main"><option value="pyeong">평</option><option value="sqm">㎡</option></select>
        </div>

        <div class="chk-block">
            <div class="chk-head" onclick="toggleBlock('body-bt')"><input type="checkbox" id="chk-bt" checked><label>바탕조정 공정</label></div>
            <div class="chk-body" id="body-bt" style="display:block;">
                <div class="row"><label>두께(mm)</label><input type="number" id="bt-thick" value="1.5"></div>
                <div class="row"><label>하이퍼 단가</label><input type="number" id="bt-price" value="65000"></div>
                <div class="row"><label>레미탈 단가</label><input type="number" id="bt-remi" value="7000"></div>
            </div>
        </div>

        <div class="chk-block">
            <div class="chk-head" onclick="toggleBlock('body-ur')"><input type="checkbox" id="chk-ur" checked><label>우레탄 방수 공정</label></div>
            <div class="chk-body" id="body-ur" style="display:block;">
                <div class="row"><label>목표 두께</label><select id="ur-thick"><option value="1.5">1.5mm</option><option value="2" selected>2.0mm</option><option value="3">3.0mm</option></select></div>
            </div>
        </div>

        <div class="chk-block">
            <div class="chk-head" onclick="toggleBlock('body-sky')"><input type="checkbox" id="chk-sky" checked><label>스카이/사다리차</label></div>
            <div class="chk-body" id="body-sky" style="display:block;">
                <div class="row"><label>장비비 총액</label><input type="number" id="sky-amt" value="650000"></div>
            </div>
        </div>
    </div>

    <button class="btn-primary no-print" onclick="runTobangLogic()">통합 견적 계산하기</button>

    <div id="result-wrap" style="display:none;">
        <div class="tab-wrap no-print">
            <button class="tab active" onclick="switchTab('gabji')">공사원가계산서 (갑지)</button>
            <button class="tab" onclick="switchTab('internal')">내부검토 내역</button>
        </div>

        <div id="print-gabji-page" class="sec">
            <h1 style="text-align:center; padding:20px 0; font-size:22px; letter-spacing:10px;">공 사 원 가 계 산 서</h1>
            <div id="gabji-content"></div>
        </div>

        <div id="print-internal-page" class="sec" style="display:none;">
            <div class="sec-title">실무 자재/노무 수량 데이터</div>
            <div id="internal-content"></div>
        </div>
        
        <button class="btn-primary no-print" style="background:#16a34a;" onclick="window.print()">견적서 인쇄 / PDF 저장</button>
    </div>
</div>

<script>
function toggleBlock(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function switchTab(type) {
    document.getElementById('print-gabji-page').style.display = type === 'gabji' ? 'block' : 'none';
    document.getElementById('print-internal-page').style.display = type === 'internal' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function n(v){ return Math.round(v).toLocaleString(); }
function ru(v){ return Math.round(v/10000)*10000; } // 10,000원 단위 반올림
